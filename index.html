<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlayTime+ Authentication</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #121212;
            color: #ffffff;
            text-align: center;
        }
        .container { max-width: 400px; padding: 20px; }
        h1 { color: #3ecf8e; margin-bottom: 10px; }
        p { color: #aaaaaa; font-size: 16px; line-height: 1.5; }
        .error-text { color: #ff6b6b !important; font-weight: bold; }
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 24px;
            background-color: #3ecf8e;
            color: #121212;
            font-weight: bold;
            text-decoration: none;
            border-radius: 6px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>PlayTime+</h1>
        <p id="status-message">Verifying your account details...</p>
        <a id="fallback-button" href="playtimeplus://" class="btn" style="display: none;">Open PlayTime+ App</a>
    </div>

    <script>
        const currentHash = window.location.hash;
        const currentSearch = window.location.search;
        const appDeepLink = "playtimeplus://" + currentSearch + currentHash;

        // Check if Supabase sent an error inside the URL parameters
        const urlParams = new URLSearchParams(currentHash.replace('#', '?'));
        const hasError = urlParams.has('error') || new URLSearchParams(currentSearch).has('error');

        if (hasError) {
            // Display an explicit error message to the user
            document.getElementById("status-message").className = "error-text";
            document.getElementById("status-message").innerHTML = 
                "This verification link has expired or has already been used.<br><br>Please trigger a new confirmation email from inside the app.";
        } else {
            // Automatically try to bounce mobile users into the app
            window.location.replace(appDeepLink);

            // Display success message for desktop users
            setTimeout(() => {
                document.getElementById("status-message").innerHTML = 
                    "Email successfully verified!<br><br>If you are on a mobile device, your app should open automatically. If you are on desktop, please switch back to your phone to log in.";
                
                const btn = document.getElementById("fallback-button");
                btn.href = appDeepLink;
                btn.style.display = "inline-block";
            }, 1000);
        }
    </script>
</body>
</html>
